name: NuGet - Build & Publish Library

on:
  push:
    branches: [main]
    paths:
      - 'Maui.CodePush/**'
      - '.github/workflows/nuget-publish.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Maui.CodePush/**'
      - '.github/workflows/nuget-publish.yml'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Build & Validate — runs on every PR and push
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android maui-ios

      - name: Restore
        run: dotnet restore Maui.CodePush/Maui.CodePush.csproj

      - name: Build
        run: dotnet build Maui.CodePush/Maui.CodePush.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Maui.CodePush/Maui.CodePush.csproj -c Release --no-build -o ./artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codepush-nuget
          path: ./artifacts/*.nupkg

  # ──────────────────────────────────────────────
  # Publish to NuGet — only on main, with approval
  # ──────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: Production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: codepush-nuget
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
