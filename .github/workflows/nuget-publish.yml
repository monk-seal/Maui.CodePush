name: NuGet - Build & Publish Library

on:
  push:
    branches: [main]
    paths:
      - 'Maui.CodePush/**'
      - '.github/workflows/nuget-publish.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Maui.CodePush/**'
      - '.github/workflows/nuget-publish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          BASE="0.1"
          VERSION="${BASE}.${{ github.run_number }}-pre"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore Maui.CodePush/Maui.CodePush.csproj

      - name: Build
        run: dotnet build Maui.CodePush/Maui.CodePush.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: dotnet pack Maui.CodePush/Maui.CodePush.csproj -c Release --no-build -o ./artifacts -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codepush-nuget
          path: ./artifacts/*.nupkg

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: codepush-nuget
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Create tag and release
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          TAG="lib-v${VERSION}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "$TAG" -m "CodePush.Maui ${VERSION}"
          git push origin "$TAG"

          PREV_TAG=$(git tag -l "lib-v*" --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## CodePush.Maui ${VERSION}" > changelog.md
          echo "" >> changelog.md
          echo "Install: \`dotnet add package CodePush.Maui --version ${VERSION}\`" >> changelog.md
          echo "" >> changelog.md
          echo "### Changes" >> changelog.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: lib-v${{ needs.build.outputs.version }}
          name: "CodePush.Maui ${{ needs.build.outputs.version }}"
          body_path: changelog.md
          prerelease: true
          files: ./artifacts/*.nupkg
