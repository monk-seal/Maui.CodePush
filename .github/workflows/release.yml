name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'
      - 'lib-v*'
      - 'cli-v*'
      - 'server-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^${TAG}$" | tail -1)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## Changes" > changelog.md
          echo "" >> changelog.md
          git log ${PREV_TAG}..${TAG} --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> changelog.md

          cat changelog.md

      - name: Determine release type
        id: type
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == lib-v* ]]; then
            echo "title=Maui.CodePush Library ${TAG#lib-}" >> $GITHUB_OUTPUT
            echo "prerelease=$([[ "$TAG" == *-pre* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == cli-v* ]]; then
            echo "title=CodePush CLI ${TAG#cli-}" >> $GITHUB_OUTPUT
            echo "prerelease=$([[ "$TAG" == *-pre* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == server-v* ]]; then
            echo "title=CodePush Server ${TAG#server-}" >> $GITHUB_OUTPUT
            echo "prerelease=$([[ "$TAG" == *-pre* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          else
            echo "title=Maui.CodePush ${TAG}" >> $GITHUB_OUTPUT
            echo "prerelease=$([[ "$TAG" == *-pre* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.type.outputs.title }}
          body_path: changelog.md
          prerelease: ${{ steps.type.outputs.prerelease }}
          generate_release_notes: false
