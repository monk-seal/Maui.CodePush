name: Server - Build, Validate & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'Maui.CodePush.Server/**'
      - '.github/workflows/server-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Maui.CodePush.Server/**'
      - '.github/workflows/server-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/codepush-server

jobs:
  # ──────────────────────────────────────────────
  # Build & Validate — runs on every PR and push
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Maui.CodePush.Server/Maui.CodePush.Server.csproj

      - name: Build
        run: dotnet build Maui.CodePush.Server/Maui.CodePush.Server.csproj -c Release --no-restore

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build Docker image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Maui.CodePush.Server/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Maui.CodePush.Server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────────
  # Deploy — only on main, requires approval
  # ──────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/codepush
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u monk-seal --password-stdin
            docker compose pull
            docker compose up -d
            sleep 3
            docker ps --filter name=codepush-server --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "Deploy complete"

      - name: Create tag and release
        run: |
          VERSION="0.1.${{ github.run_number }}"
          TAG="server-v${VERSION}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "$TAG" -m "CodePush Server ${VERSION}"
          git push origin "$TAG"

          PREV_TAG=$(git tag -l "server-v*" --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## CodePush Server ${VERSION}" > changelog.md
          echo "" >> changelog.md
          echo "Docker: \`docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest\`" >> changelog.md
          echo "" >> changelog.md
          echo "### Changes" >> changelog.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: server-v0.1.${{ github.run_number }}
          name: "CodePush Server 0.1.${{ github.run_number }}"
          body_path: changelog.md
          prerelease: false
