name: CLI - Build & Publish

on:
  push:
    branches: [main]
    paths:
      - 'Maui.CodePush.Cli/**'
      - '.github/workflows/cli-build.yml'
    tags:
      - 'cli-v*'
  pull_request:
    branches: [main]
    paths:
      - 'Maui.CodePush.Cli/**'
      - '.github/workflows/cli-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Inject server URL
        run: sed -i 's|#{CODEPUSH_SERVER_URL}#|${{ secrets.CODEPUSH_SERVER_URL }}|g' Maui.CodePush.Cli/appsettings.json

      - name: Restore
        run: dotnet restore Maui.CodePush.Cli/Maui.CodePush.Cli.csproj

      - name: Build
        run: dotnet build Maui.CodePush.Cli/Maui.CodePush.Cli.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Maui.CodePush.Cli/Maui.CodePush.Cli.csproj -c Release --no-build -o ./artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codepush-cli
          path: ./artifacts/*.nupkg

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/cli-v')
    environment: Production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: codepush-cli
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
